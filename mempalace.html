 AI-assisted coding tool. She described the project as a collaboration between her vision for how AI memory should work and Ben Sigman's engineering expertise. The project is MIT licensed and available on her GitHub account at github.com/milla-jovovich/mempalace."}},{"@type":"Question","name":"What is MemPalace?","acceptedAnswer":{"@type":"Answer","text":"MemPalace is a free, open-source AI memory system that gives large language models persistent, cross-session memory. As of 2026, it holds the highest score on the LongMemEval benchmark (96.6% raw, 100% hybrid) among free tools. It stores all conversation data verbatim — rather than using AI to extract summaries — and uses vector search to retrieve relevant memories. It runs entirely locally using ChromaDB and SQLite, with zero API costs. MemPalace was created by Milla Jovovich and Ben Sigman and is MIT-licensed."}},{"@type":"Question","name":"Is the 100% benchmark score real?","acceptedAnswer":{"@type":"Answer","text":"MemPalace claims 100% on LongMemEval in hybrid mode (with optional Haiku reranking) and 96.6% in raw mode (zero API). However, these scores have been questioned by independent reviewers. The 100% hybrid score was achieved after targeted fixes for specific failing questions, and some methodology choices (like top_k settings) have been debated. The raw 96.6% score is generally considered more credible. See our full benchmark analysis for details."}},{"@type":"Question","name":"Is MemPalace free?","acceptedAnswer":{"@type":"Answer","text":"Yes — MemPalace is 100% free and MIT-licensed. It runs entirely on your local machine with zero cloud dependencies. The raw search mode requires no API keys and no cost at all. The optional hybrid mode (which achieves the 100% benchmark score) uses a cloud LLM for reranking at approximately $0.001 per query. There are no paid tiers, subscriptions, or usage limits."}},{"@type":"Question","name":"How does MemPalace compare to Mem0?","acceptedAnswer":{"@type":"Answer","t
